name: Compilar APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Compilar APK (debug)
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Renombrar APK
        run: cp app/build/outputs/apk/debug/app-debug.apk MisHoras.apk

      - name: Subir APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: MisHoras-APK
          path: MisHoras.apk
          retention-days: 90

      - name: Crear Release con el APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "MisHoras build ${{ github.run_number }}"
          files: MisHoras.apk
          make_latest: "true"
          body: |
            APK generado automaticamente.
            Descarga el archivo `MisHoras.apk` de abajo e instalalo en tu celular.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
